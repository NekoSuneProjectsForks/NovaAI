<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaAI Earnings Overlay</title>
  <style>
    /* Transparent so it drops straight into OBS as a Browser Source. */
    html, body {
      margin: 0; padding: 0; background: transparent;
      font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden;
    }
    .card {
      display: inline-flex; flex-direction: column; gap: 4px;
      padding: 14px 20px; border-radius: 16px;
      background: linear-gradient(135deg, rgba(124,77,255,0.92), rgba(233,84,196,0.92));
      color: #fff; box-shadow: 0 8px 30px rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
    }
    .label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.85; }
    .total { font-size: 34px; font-weight: 800; line-height: 1; }
    .row { font-size: 13px; opacity: 0.9; }
    .last { font-size: 12px; opacity: 0.85; margin-top: 2px; }
    .pop { animation: pop 0.6s ease; }
    @keyframes pop { 0%{transform:scale(1)} 30%{transform:scale(1.12)} 100%{transform:scale(1)} }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="label" id="title">💜 Tips</div>
    <div class="total" id="total">—</div>
    <div class="row" id="today"></div>
    <div class="last" id="last"></div>
  </div>

  <script>
    // ?show=all|today|session  (default all-time)  ·  ?title=Goal  ·  ?goal=500
    const params = new URLSearchParams(location.search);
    const show = (params.get('show') || 'all').toLowerCase();
    const goal = parseFloat(params.get('goal') || '0');
    if (params.get('title')) document.getElementById('title').textContent = params.get('title');

    const symbols = { USD: '$', GBP: '£', EUR: '€', CAD: '$', AUD: '$', JPY: '¥' };
    let lastTotal = null;

    function fmt(n, cur) {
      const sym = symbols[(cur || 'USD').toUpperCase()] || '';
      const v = (Math.round(n * 100) / 100);
      return sym + (v === Math.floor(v) ? v.toFixed(0) : v.toFixed(2));
    }

    async function refresh() {
      try {
        const res = await fetch('/api/call', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ method: 'get_earnings', args: [] }),
        });
        const body = await res.json();
        const e = body.result || {};
        const cur = e.currency || 'USD';
        const amount = show === 'today' ? e.today : show === 'session' ? e.session : e.all_time;

        document.getElementById('total').textContent =
          goal > 0 ? `${fmt(amount, cur)} / ${fmt(goal, cur)}` : fmt(amount || 0, cur);
        document.getElementById('today').textContent =
          show === 'all' ? `Today: ${fmt(e.today || 0, cur)} · ${e.count || 0} tips` : '';
        if (e.last && e.last.user) {
          document.getElementById('last').textContent = `Last: ${e.last.user} (${fmt(e.last.amount || 0, cur)})`;
        }

        if (lastTotal !== null && amount > lastTotal) {
          const card = document.getElementById('card');
          card.classList.remove('pop'); void card.offsetWidth; card.classList.add('pop');
        }
        lastTotal = amount || 0;
      } catch (e) { /* server not up yet */ }
    }

    // Live nudge from the app when a tip lands, plus a steady poll fallback.
    try {
      const es = new EventSource('/events');
      es.onmessage = (ev) => { if (String(ev.data).includes('__onEarnings')) refresh(); };
    } catch (e) {}
    refresh();
    setInterval(refresh, 4000);
  </script>
</body>
</html>
